; PlatformIO Project Configuration
; ESP32-WROOM-32 Text-to-Speech Device

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    earlephilhower/ESP8266Audio @ ^1.9.7
    bblanchon/ArduinoJson @ ^6.21.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
